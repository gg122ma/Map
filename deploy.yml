# ============================================================
# 文件：.github/workflows/deploy.yml
# 职责：每次你 push 代码到 main 分支时，自动：
#         1. 安装依赖（npm install）
#         2. 打包项目（npm run build）
#         3. 把打包结果部署到 GitHub Pages
# 完成后你会得到一个网址：
#   https://你的用户名.github.io/你的仓库名/
# ============================================================

name: 部署 KMK Campus Map 到 GitHub Pages

on:
  # 触发条件：push 到 main 分支时自动运行
  push:
    branches: [main]

  # 也允许在 GitHub 网页上手动点击运行
  workflow_dispatch:

# 设置权限：允许 Actions 写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 防止多个部署同时运行
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- 第一步：构建项目 ----
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你的代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 安装 Node.js 环境
      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # 缓存 npm 依赖，加快速度

      # 3. 安装项目依赖
      - name: 安装依赖 (npm install)
        run: npm install

      # 4. 打包项目
      # viteSingleFile 会把所有 JS/CSS 内联到 dist/index.html
      - name: 打包项目 (npm run build)
        run: npm run build

      # 5. 配置 GitHub Pages
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      # 6. 上传打包结果（dist 文件夹）
      - name: 上传打包文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # vite 默认输出到 dist 文件夹

  # ---- 第二步：部署到 GitHub Pages ----
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}  # 部署完成后的网址
    runs-on: ubuntu-latest
    needs: build  # 必须等 build 完成才运行
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
